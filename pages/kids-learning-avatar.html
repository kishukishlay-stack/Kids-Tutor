<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buddy — Learn A-Z & Phonics</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#1a2a4a;--sky2:#0f1e38;--sky3:#0a1228;
  --sun:#FFD93D;--coral:#FF6B6B;--green:#6BCB77;
  --purple:#c77dff;--blue:#6EC6F5;--pink:#ff85c2;
  --white:#fff;--light:#e8f0ff;--gold:#FFD93D;
  --border:rgba(255,255,255,0.1);--glass:rgba(255,255,255,0.06);
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --bear-body:#c68642;--bear-dark:#8b5e3c;--bear-light:#e8a96a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--sky3);color:var(--white);touch-action:manipulation;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 30% 20%,rgba(108,203,255,.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 70% 80%,rgba(199,125,255,.07) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;}

/* ── TOP NAV ── */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(10,18,40,.97);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;z-index:10;}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--sun),var(--coral));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.appname{font-family:'Fredoka One',cursive;font-size:18px;color:var(--white);}
.appsub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:6px;}
.star-pill{background:rgba(255,217,61,.12);border:1.5px solid rgba(255,217,61,.25);border-radius:50px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--sun);white-space:nowrap;}

/* LANG SWITCHER */
.lang-wrap{display:flex;gap:3px;}
.langbtn{padding:5px 9px;border-radius:8px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .18s;white-space:nowrap;}
.langbtn.active{background:rgba(255,217,61,.15);border-color:rgba(255,217,61,.4);color:var(--sun);}

/* ── CONTENT AREA ── */
#content{flex:1;display:flex;overflow:hidden;}

/* ── LEFT SIDEBAR (desktop) ── */
#left{width:200px;flex-shrink:0;background:rgba(15,30,56,.95);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:8px;overflow:hidden;position:relative;}
#buddyCanvas{display:block;width:180px!important;height:200px!important;}

.srow{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:4px 12px;font-size:11px;color:var(--sun);font-weight:700;margin:2px 0 3px;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:sdp 1.5s infinite;flex-shrink:0;}
.sdot.sp{background:var(--sun);animation:sdp .35s infinite;}
.sdot.th{background:var(--blue);animation:sdp .7s infinite;}
.sdot.li{background:var(--coral);animation:sdp .3s infinite;}
@keyframes sdp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}

.viz{display:flex;gap:3px;align-items:center;height:24px;opacity:0;transition:opacity .3s;}
.viz.on{opacity:1;}
.vb{width:4px;border-radius:2px;background:linear-gradient(to top,var(--sun),#fff59d);animation:vba .5s ease infinite;}
.vb:nth-child(1){height:6px}.vb:nth-child(2){height:12px;animation-delay:.05s}.vb:nth-child(3){height:18px;animation-delay:.1s}
.vb:nth-child(4){height:22px;animation-delay:.15s}.vb:nth-child(5){height:18px;animation-delay:.2s}
.vb:nth-child(6){height:12px;animation-delay:.25s}.vb:nth-child(7){height:6px;animation-delay:.3s}
@keyframes vba{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}

.uviz{display:flex;gap:3px;align-items:center;height:24px;opacity:0;transition:opacity .3s;}
.uviz.on{opacity:1;}
.uvb{width:4px;border-radius:2px;background:linear-gradient(to top,var(--coral),#ffb3b3);animation:vba .3s ease infinite;}
.uvb:nth-child(1){height:8px}.uvb:nth-child(2){height:16px;animation-delay:.04s}.uvb:nth-child(3){height:22px;animation-delay:.08s}
.uvb:nth-child(4){height:26px;animation-delay:.12s}.uvb:nth-child(5){height:22px;animation-delay:.16s}
.uvb:nth-child(6){height:16px;animation-delay:.2s}.uvb:nth-child(7){height:8px;animation-delay:.24s}

.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;margin:4px 0 5px;}
#micBtn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .22s;position:relative;background:linear-gradient(135deg,var(--sun),var(--coral));box-shadow:0 6px 22px rgba(255,107,107,.4);}
#micBtn.on{background:linear-gradient(135deg,var(--coral),#b91c1c);animation:mpulse .7s infinite;}
#micBtn.speaking{background:linear-gradient(135deg,var(--blue),#1d4ed8);}
@keyframes mpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.mring{position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--sun);opacity:0;animation:mra 1.5s infinite;}
.mring2{animation-delay:.5s;}
@keyframes mra{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}
.mlbl{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:.5px;text-align:center;padding:0 6px;}
.mlbl.on{color:var(--coral);}
.mlbl.sp{color:var(--blue);}

/* ALPHA SCROLL */
.alpha-wrap{padding:4px 8px 8px;overflow:hidden;}
.alpha-bar-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;padding:2px 2px 4px;font-weight:600;}
.alpha-bar{display:flex;flex-wrap:wrap;gap:3px;}
.ab{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,.7);cursor:pointer;flex-shrink:0;transition:all .18s;}
.ab:hover,.ab.active{background:linear-gradient(135deg,var(--sun),var(--coral));border-color:transparent;color:var(--sky3);}

/* MODE TABS */
.mode-tabs{display:flex;gap:4px;padding:4px 8px 6px;}
.mtab{flex:1;padding:6px 2px;border-radius:8px;border:1.5px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.55);font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all .18s;text-align:center;}
.mtab.active{background:linear-gradient(135deg,rgba(255,217,61,.2),rgba(255,107,107,.15));border-color:rgba(255,217,61,.4);color:var(--sun);}

/* STATS */
.stats-row{display:flex;gap:4px;padding:4px 8px 8px;}
.stat-pill{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px;text-align:center;font-size:10px;font-weight:800;color:var(--sun);}
.stat-pill span{display:block;font-size:15px;font-family:'Fredoka One',cursive;}

/* ── RIGHT PANEL ── */
#right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.rbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,18,40,.9);flex-shrink:0;}
.rbar-t{font-family:'Fredoka One',cursive;font-size:16px;color:var(--white);}
.rbar-s{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.rbar-btns{display:flex;gap:5px;}
.rbb{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--glass);color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.rbb:hover{border-color:rgba(255,217,61,.4);color:var(--sun);}

#lesson-panel{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;-webkit-overflow-scrolling:touch;}
#lesson-panel::-webkit-scrollbar{width:3px;}
#lesson-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

/* LETTER HERO */
.letter-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:16px 16px 14px;background:linear-gradient(135deg,rgba(255,217,61,.08),rgba(255,107,107,.06));border:1.5px solid rgba(255,217,61,.15);border-radius:20px;margin-bottom:14px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.big-letter{font-family:'Fredoka One',cursive;font-size:80px;line-height:1;background:linear-gradient(135deg,var(--sun),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 12px rgba(255,217,61,.3));}
.letter-word{font-family:'Fredoka One',cursive;font-size:22px;color:var(--white);margin:3px 0;}
.letter-emoji{font-size:44px;margin:3px 0;}
.letter-trans{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:6px 0 2px;}
.trans-pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:4px 12px;font-size:12px;font-weight:700;color:rgba(255,255,255,.85);}
.trans-pill .tl{font-size:9px;color:rgba(255,255,255,.4);display:block;margin-bottom:1px;letter-spacing:1px;text-transform:uppercase;}

.phonics-section{width:100%;margin-top:8px;}
.phonics-title{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:700;}
.phonics-cards{display:flex;flex-direction:column;gap:6px;width:100%;}
.phonics-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all .18s;text-align:left;}
.phonics-card:active{transform:scale(.97);}
.phonics-card.short-sound{border-left:3px solid #6BCB77;}
.phonics-card.long-sound{border-left:3px solid #6EC6F5;}
.phonics-card.other-sound{border-left:3px solid #c77dff;}
.pc-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.pc-body{flex:1;min-width:0;}
.pc-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.pc-label.short{color:#6BCB77;}
.pc-label.long{color:#6EC6F5;}
.pc-label.other{color:#c77dff;}
.pc-sound{font-family:'Fredoka One',cursive;font-size:14px;color:var(--white);margin-bottom:2px;}
.pc-examples{font-size:11px;color:rgba(255,255,255,.65);font-weight:600;line-height:1.5;}
.pc-examples em{color:var(--sun);font-style:normal;font-weight:800;}
.hear-sound-btn{background:rgba(255,255,255,.1);border:none;border-radius:7px;padding:4px 9px;font-size:11px;color:rgba(255,255,255,.6);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .15s;flex-shrink:0;margin-top:2px;}

.letter-sentence{font-size:13px;color:rgba(255,255,255,.7);margin-top:8px;line-height:1.5;font-weight:600;}

/* CHOICES */
.choices-wrap{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.choice{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 10px;font-family:'Fredoka One',cursive;font-size:22px;color:var(--white);cursor:pointer;transition:all .18s;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px;min-height:60px;}
.choice:active{transform:scale(.95);}
.choice.correct{background:linear-gradient(135deg,rgba(107,203,119,.3),rgba(107,203,119,.15));border-color:var(--green);color:var(--green);animation:wiggle .4s ease;}
.choice.wrong{background:linear-gradient(135deg,rgba(255,107,107,.3),rgba(255,107,107,.15));border-color:var(--coral);color:var(--coral);animation:shake .4s ease;}
@keyframes wiggle{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.buddy-says{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:12px 16px;font-size:13px;font-weight:700;color:rgba(255,255,255,.9);line-height:1.5;margin-bottom:12px;position:relative;text-align:center;}
.buddy-says::before{content:'💬';font-size:15px;margin-right:5px;}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;gap:10px;}
.mr{display:flex;gap:8px;align-items:flex-end;animation:mf .28s ease;}
.mr.u{flex-direction:row-reverse;}
@keyframes mf{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.mav{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;background:rgba(15,30,56,.8);}
.mav.u{background:rgba(255,217,61,.15);}
.bub{max-width:400px;padding:10px 14px;border-radius:13px;font-size:13px;line-height:1.6;font-weight:600;}
.bub.b{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);border-radius:4px 13px 13px 13px;}
.bub.u{background:linear-gradient(135deg,rgba(255,217,61,.2),rgba(255,107,107,.12));border:1.5px solid rgba(255,217,61,.25);border-radius:13px 4px 13px 13px;}
.mt{font-size:9px;color:rgba(255,255,255,.35);margin-top:2px;}
.mw{display:flex;flex-direction:column;}
.mw.u{align-items:flex-end;}
.dl-wrap{display:flex;gap:4px;align-items:center;height:16px;}
.dl{width:6px;height:6px;border-radius:50%;background:var(--sun);animation:dlb 1.1s infinite;opacity:.7;}
.dl:nth-child(2){animation-delay:.18s}.dl:nth-child(3){animation-delay:.36s}
@keyframes dlb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ACTION BTNS */
.action-row{display:flex;gap:8px;margin-bottom:12px;}
.abtn{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-family:'Fredoka One',cursive;font-size:14px;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px;}
.abtn.hear{background:linear-gradient(135deg,var(--blue),#2980b9);color:white;box-shadow:0 4px 14px rgba(110,198,245,.3);}
.abtn.next{background:linear-gradient(135deg,var(--sun),var(--coral));color:white;box-shadow:0 4px 14px rgba(255,217,61,.3);}
.abtn.next:disabled{opacity:.4;cursor:not-allowed;}
.abtn:active:not(:disabled){transform:scale(.96);}

/* PROGRESS */
.prog-bar-bg{background:rgba(255,255,255,.08);border-radius:50px;height:6px;margin-bottom:12px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--sun),var(--coral));transition:width .5s ease;}

/* INPUT */
.inp-zone{padding:8px 14px 12px;border-top:1px solid var(--border);background:rgba(10,18,40,.85);flex-shrink:0;}
.ibox{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:7px 11px;}
.ibox:focus-within{border-color:rgba(255,217,61,.35);}
#ci{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;min-width:0;}
#ci::placeholder{color:rgba(255,255,255,.3);}
.sndb{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--sun),var(--coral));border:none;color:var(--sky3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* LIVE TRANSCRIPT */
.live-t{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(15,24,41,.97);border:1.5px solid rgba(255,217,61,.3);border-radius:12px;padding:8px 18px;font-size:12px;color:var(--white);max-width:90vw;text-align:center;display:none;z-index:100;backdrop-filter:blur(10px);font-weight:700;}
.live-t.show{display:block;}
.lt-lbl{font-size:9px;color:var(--sun);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}

/* ── BOTTOM NAV (mobile) ── */
#bottomNav{display:none;padding:0;background:rgba(10,18,40,.97);border-top:1px solid var(--border);flex-shrink:0;}
.bnav-tabs{display:flex;}
.btab{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.45);font-family:'Nunito',sans-serif;font-size:9px;font-weight:700;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.btab.active{color:var(--sun);}
.btab .bti{font-size:18px;line-height:1;}

/* ── MOBILE BUDDY BAR ── */
#mobileBuddy{display:none;flex-shrink:0;background:rgba(15,30,56,.97);border-bottom:1px solid var(--border);padding:6px 14px;align-items:center;gap:10px;}
.mb-canvas-wrap{flex-shrink:0;}
#mobileBuddyCanvas{display:block;width:72px!important;height:72px!important;}
.mb-info{flex:1;min-width:0;}
.mb-status{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.mb-srow{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sun);font-weight:700;}
.mb-sdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:sdp 1.5s infinite;flex-shrink:0;}
.mb-sdot.sp{background:var(--sun);animation:sdp .35s infinite;}
.mb-sdot.th{background:var(--blue);animation:sdp .7s infinite;}
.mb-sdot.li{background:var(--coral);animation:sdp .3s infinite;}
.mb-viz{display:flex;gap:2px;align-items:center;height:18px;opacity:0;transition:opacity .3s;}
.mb-viz.on{opacity:1;}
.mb-vb{width:3px;border-radius:2px;background:linear-gradient(to top,var(--sun),#fff59d);animation:vba .5s ease infinite;}
.mb-vb:nth-child(1){height:5px}.mb-vb:nth-child(2){height:10px;animation-delay:.05s}.mb-vb:nth-child(3){height:15px;animation-delay:.1s}
.mb-vb:nth-child(4){height:18px;animation-delay:.15s}.mb-vb:nth-child(5){height:15px;animation-delay:.2s}
.mb-vb:nth-child(6){height:10px;animation-delay:.25s}.mb-vb:nth-child(7){height:5px;animation-delay:.3s}
.mb-uviz{display:flex;gap:2px;align-items:center;height:18px;opacity:0;transition:opacity .3s;}
.mb-uviz.on{opacity:1;}
.mb-uvb{width:3px;border-radius:2px;background:linear-gradient(to top,var(--coral),#ffb3b3);animation:vba .3s ease infinite;}
.mb-uvb:nth-child(1){height:6px}.mb-uvb:nth-child(2){height:13px;animation-delay:.04s}.mb-uvb:nth-child(3){height:18px;animation-delay:.08s}
.mb-uvb:nth-child(4){height:22px;animation-delay:.12s}.mb-uvb:nth-child(5){height:18px;animation-delay:.16s}
.mb-uvb:nth-child(6){height:13px;animation-delay:.2s}.mb-uvb:nth-child(7){height:6px;animation-delay:.24s}
.mb-right{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
#mobileMicBtn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;background:linear-gradient(135deg,var(--sun),var(--coral));box-shadow:0 4px 16px rgba(255,107,107,.35);position:relative;transition:all .2s;}
#mobileMicBtn.on{background:linear-gradient(135deg,var(--coral),#b91c1c);animation:mpulse .7s infinite;}
#mobileMicBtn.speaking{background:linear-gradient(135deg,var(--blue),#1d4ed8);}
.mb-mlbl{font-size:9px;color:rgba(255,255,255,.5);font-weight:700;text-align:center;}

/* ALPHA SCROLL (mobile bottom) */
#mobileAlphaWrap{display:none;background:rgba(10,18,40,.95);border-bottom:1px solid var(--border);padding:6px 10px 8px;flex-shrink:0;}
.m-alpha-bar{display:flex;overflow-x:auto;gap:5px;scrollbar-width:none;}
.m-alpha-bar::-webkit-scrollbar{display:none;}

function t(key, ...args) {
  const L = LANG[currentLang];
  const val = L[key];
  if (typeof val === 'function') return val(...args);
  return val || LANG.en[key] || key;
}

function setLang(lang) {
  currentLang = lang;
  ['en','hi','zh'].forEach(l => {
    document.getElementById('lbtn-'+l)?.classList.toggle('active', l===lang);
  });
  document.getElementById('appSubLabel').textContent = t('appSub');
  updateStateLabels(A.state);
  document.getElementById('mlbl').textContent = t('tapSpeak');
  document.getElementById('mbmlbl').textContent = t('speak');
  document.getElementById('ci').placeholder = currentLang==='hi' ? 'बडी से कुछ भी पूछें…' : currentLang==='zh' ? '问巴迪任何问题…' : 'Ask Buddy anything…';
  if (mode === 'learn') showLearnPanel();
  else if (mode === 'quiz') showQuizPanel();
  else showChatPanel();
}

const PHON=[[0,0],[.4,1],[.75,2],[.55,1],[.1,0],[.7,2],[.45,1],[.05,0],[.85,2],[.55,1],[.2,0],[.65,2]];
const lerp=(a,b,t2)=>a+(b-a)*t2;

function drawBG(c,w,h){
  const g=c.createRadialGradient(w/2,h*.7,10,w/2,h*.4,w);
  g.addColorStop(0,'#0f1e38');g.addColorStop(1,'#0a1228');
  c.fillStyle=g;c.fillRect(0,0,w,h);
  c.fillStyle='rgba(255,255,255,0.4)';
  [[w*.1,h*.08],[w*.3,h*.13],[w*.8,h*.07],[w*.9,h*.15],[w*.55,h*.05]].forEach(([x,y])=>{
    c.beginPath();c.arc(x,y,1+Math.sin(A.t+x)*.5,0,Math.PI*2);c.fill();
  });
}

function drawTeddy(c,cx2,cy2,scale){
  const s=scale||1;
  c.save();
  c.translate(cx2,cy2);
  c.scale(s,s);
  const bx=0, by=A.breathY+A.bounce;

  // Shadow
  c.fillStyle='rgba(0,0,0,0.22)';
  c.beginPath();c.ellipse(bx,by+72,38,8,0,0,Math.PI*2);c.fill();

  // Feet
  const fg=c.createRadialGradient(bx-18,by+65,2,bx-18,by+62,18);
  fg.addColorStop(0,'#e8a96a');fg.addColorStop(1,'#c68642');
  c.fillStyle=fg;
  c.beginPath();c.ellipse(bx-18,by+66,14,9,-.15,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(139,94,60,0.45)';
  c.beginPath();c.ellipse(bx-18,by+70,6,3.5,0,0,Math.PI*2);c.fill();
  c.fillStyle=fg;
  c.beginPath();c.ellipse(bx+18,by+66,14,9,.15,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(139,94,60,0.45)';
  c.beginPath();c.ellipse(bx+18,by+70,6,3.5,0,0,Math.PI*2);c.fill();

  // Body
  const bg=c.createRadialGradient(bx-8,by+10,5,bx,by+15,44);
  bg.addColorStop(0,'#e8a96a');bg.addColorStop(1,'#c68642');
  c.fillStyle=bg;
  c.beginPath();c.ellipse(bx,by+15,34,42,0,0,Math.PI*2);c.fill();
  const belly=c.createRadialGradient(bx,by+20,3,bx,by+20,22);
  belly.addColorStop(0,'#f5deb3');belly.addColorStop(1,'#e8c88a');
  c.fillStyle=belly;
  c.beginPath();c.ellipse(bx,by+20,19,23,0,0,Math.PI*2);c.fill();

  // Waving arm
  const wAngle=-Math.PI/3+Math.sin(A.waveT*2.5)*Math.PI/4*A.waving;
  c.save();c.translate(bx-30,by+5);c.rotate(wAngle);
  c.fillStyle=bg;
  c.beginPath();c.ellipse(0,12,9,17,0,0,Math.PI*2);c.fill();
  c.fillStyle='#e8a96a';
  c.beginPath();c.ellipse(0,27,8.5,8.5,0,0,Math.PI*2);c.fill();
  c.restore();

  // Right arm
  c.save();c.translate(bx+30,by+5);c.rotate(Math.PI/6+Math.sin(A.t*.4)*.04);
  c.fillStyle=bg;
  c.beginPath();c.ellipse(0,12,9,17,0,0,Math.PI*2);c.fill();
  c.fillStyle='#e8a96a';
  c.beginPath();c.ellipse(0,27,8.5,8.5,0,0,Math.PI*2);c.fill();
  c.restore();

  // Head
  c.save();c.translate(bx,by);c.rotate(A.headTilt);

  // Ears
  const earG=c.createRadialGradient(-24,-47,2,-24,-47,13);
  earG.addColorStop(0,'#e8a96a');earG.addColorStop(1,'#b5763a');
  c.fillStyle=earG;
  c.beginPath();c.ellipse(-22,-48,13,13,0,0,Math.PI*2);c.fill();
  c.fillStyle='#e8956a';
  c.beginPath();c.ellipse(-22,-48,7,7,0,0,Math.PI*2);c.fill();
  c.fillStyle=earG;
  c.beginPath();c.ellipse(22,-48,13,13,0,0,Math.PI*2);c.fill();
  c.fillStyle='#e8956a';
  c.beginPath();c.ellipse(22,-48,7,7,0,0,Math.PI*2);c.fill();

  // Head
  const hg=c.createRadialGradient(-5,-26,4,0,-24,28);
  hg.addColorStop(0,'#e8a96a');hg.addColorStop(1,'#c68642');
  c.fillStyle=hg;
  c.beginPath();c.ellipse(0,-24,27,27,0,0,Math.PI*2);c.fill();

  // Eyes
  const eyeOp=1-A.blinkT;
  const px=A.pupX*.1,py=A.pupY*.1;
  c.fillStyle='rgba(255,255,255,0.95)';
  c.beginPath();c.ellipse(-10,-26,8,8*eyeOp,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(10,-26,8,8*eyeOp,0,0,Math.PI*2);c.fill();
  if(eyeOp>.1){
    c.fillStyle='#1a0a00';
    c.beginPath();c.ellipse(-10+px,-26+py,4.5,4.5*eyeOp,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(10+px,-26+py,4.5,4.5*eyeOp,0,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,255,255,0.9)';
    c.beginPath();c.ellipse(-8+px,-28+py,1.7,1.7*eyeOp,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(12+px,-28+py,1.7,1.7*eyeOp,0,0,Math.PI*2);c.fill();
  }
  if(A.blinkT>.05){
    c.fillStyle='#c68642';
    c.beginPath();c.ellipse(-10,-26-8*(1-A.blinkT),9,9,0,Math.PI,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(10,-26-8*(1-A.blinkT),9,9,0,Math.PI,Math.PI*2);c.fill();
  }

  // Eyebrows
  c.strokeStyle='#6b3a1f';c.lineWidth=2;c.lineCap='round';
  const bl=A.browR*5;
  c.beginPath();c.moveTo(-16,-36-bl);c.quadraticCurveTo(-10,-39-bl,-4,-36-bl*.6);c.stroke();
  c.beginPath();c.moveTo(4,-36-bl*.6);c.quadraticCurveTo(10,-39-bl,16,-36-bl);c.stroke();

  // Blush
  c.fillStyle='rgba(255,140,100,0.22)';
  c.beginPath();c.ellipse(-16,-18,8,4.5,-.15,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(16,-18,8,4.5,.15,0,Math.PI*2);c.fill();

  // Snout
  const snoutG=c.createRadialGradient(0,-11,2,0,-12,12);
  snoutG.addColorStop(0,'#f5e6c8');snoutG.addColorStop(1,'#e8cfa0');
  c.fillStyle=snoutG;
  c.beginPath();c.ellipse(0,-11,12,8.5,0,0,Math.PI*2);c.fill();

  // Nose
  c.fillStyle='#2d0c02';
  c.beginPath();c.ellipse(0,-17,4.5,3,0,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(255,255,255,0.3)';
  c.beginPath();c.ellipse(-1.2,-18,1.3,0.9,0,0,Math.PI*2);c.fill();

  // Mouth
  const bkOpen=A.mOpen*6;
  c.strokeStyle='#5a2a0a';c.lineWidth=1.8;c.lineCap='round';
  c.beginPath();c.moveTo(-5,-8);c.quadraticCurveTo(0,-5+A.mShape*3.5+bkOpen,5,-8);c.stroke();
  c.beginPath();c.moveTo(0,-11);c.lineTo(0,-8);c.stroke();
  if(bkOpen>1){
    c.fillStyle='#361005';
    c.beginPath();c.ellipse(0,-6+bkOpen*.25,4,bkOpen*.5,0,0,Math.PI*2);c.fill();
  }

  // Sparkles
  if(A.excite>0.3){
    c.fillStyle='rgba(255,217,61,'+A.excite+')';
    [[22,-16],[27,-4],[-25,-10],[-29,2]].forEach(([sx,sy])=>{
      c.font=`${12*A.excite}px serif`;c.textAlign='center';
      c.fillText('✦',sx,sy);
    });
  }

  // Bow
  if(A.state!=='listening'){
    c.save();c.translate(0,3);
    c.fillStyle='#FF6B6B';
    c.beginPath();c.moveTo(-9,0);c.quadraticCurveTo(-4,-4,0,0);c.quadraticCurveTo(-4,4,-9,0);c.fill();
    c.beginPath();c.moveTo(9,0);c.quadraticCurveTo(4,-4,0,0);c.quadraticCurveTo(4,4,9,0);c.fill();
    c.fillStyle='#b91c1c';c.beginPath();c.ellipse(0,0,2.5,2.5,0,0,Math.PI*2);c.fill();
    c.restore();
  }
  c.restore();
  c.restore();
}

function frame(){
  ctx.clearRect(0,0,W,H);
  drawBG(ctx,W,H);
  drawTeddy(ctx, W/2, H*.50, W/200);

  mctx.clearRect(0,0,MW,MH);
  drawBG(mctx,MW,MH);
  drawTeddy(mctx, MW/2, MH*.60, MW/220);
}

function tick(){
  A.t+=.016;A.stT+=.016;
  A.breathY=Math.sin(A.t*1.2)*2.2;
  A.headTilt=Math.sin(A.t*.45)*.03;
  A.pupX=Math.sin(A.t*.3)*2.2+Math.sin(A.t*.7)*1;
  A.pupY=Math.sin(A.t*.35)*1.5;
  A.blinkNext--;
  if(A.blinkNext<=0){A.blinkT=Math.min(1,A.blinkT+.3);if(A.blinkT>=1){A.blinkT=Math.max(0,A.blinkT-.24);if(A.blinkT<=0)A.blinkNext=120+Math.random()*160;}}
  else A.blinkT=Math.max(0,A.blinkT-.24);

  if(A.state==='idle'){A.browR=lerp(A.browR,0,.05);A.mOpen=lerp(A.mOpen,0,.08);A.mShape=lerp(A.mShape,1,.04);A.waving=lerp(A.waving,0,.05);A.bounce=lerp(A.bounce,0,.06);A.excite=lerp(A.excite,0,.04);}
  else if(A.state==='thinking'){A.browR=lerp(A.browR,.35,.05);A.mOpen=lerp(A.mOpen,.05,.06);A.mShape=lerp(A.mShape,0,.05);A.waving=lerp(A.waving,0,.05);}
  else if(A.state==='speaking'){A.browR=lerp(A.browR,.2,.04);A.phonTimer--;if(A.phonTimer<=0){A.phonIdx=(A.phonIdx+1)%PHON.length;A.phonTimer=2+Math.random()*5;}const[to,ts2]=PHON[A.phonIdx];A.mOpen=lerp(A.mOpen,to,.3);A.mShape=lerp(A.mShape,ts2,.24);}
  else if(A.state==='listening'){A.browR=lerp(A.browR,.5,.05);A.mOpen=lerp(A.mOpen,.08,.06);}
  else if(A.state==='excited'){A.waving=lerp(A.waving,1,.1);A.waveT+=.14;A.browR=lerp(A.browR,.9,.08);A.mShape=lerp(A.mShape,1,.08);A.mOpen=lerp(A.mOpen,.3,.1);A.bounce=lerp(A.bounce,1,.08)*Math.abs(Math.sin(A.t*8))*5;A.excite=lerp(A.excite,1,.08);if(A.stT>2.5)setState('idle');}
  else if(A.state==='greeting'){A.waving=lerp(A.waving,1,.09);A.waveT+=.13;A.browR=lerp(A.browR,.8,.07);A.mOpen=lerp(A.mOpen,.25,.09);A.mShape=lerp(A.mShape,1,.07);if(A.stT>3)setState('idle');}
  frame();requestAnimationFrame(tick);
}
tick();

function updateStateLabels(s) {
  const stateText = {idle: t('ready'), thinking: t('thinking'), speaking: t('speaking'), listening: t('listening'), excited: t('excited'), greeting: t('greeting')};
  const lbl = stateText[s] || t('ready');
  document.getElementById('slbl').textContent = lbl;
  document.getElementById('mbslbl').textContent = lbl;

  const d = document.getElementById('sdot');
  const mbd = document.getElementById('mbsdot');
  const cls = 'sdot'+(s==='speaking'?' sp':s==='thinking'?' th':s==='listening'?' li':'');
  const mbcls = 'mb-sdot'+(s==='speaking'?' sp':s==='thinking'?' th':s==='listening'?' li':'');
  if(d) d.className = cls;
  if(mbd) mbd.className = mbcls;

  // viz
  document.getElementById('viz').classList.toggle('on', s==='speaking');
  document.getElementById('uviz').classList.toggle('on', s==='listening');
  document.getElementById('mbviz').classList.toggle('on', s==='speaking');
  document.getElementById('mbuviz').classList.toggle('on', s==='listening');

  // mic buttons
  ['micBtn','mobileMicBtn'].forEach(id => {
    const btn = document.getElementById(id);
    if(btn) btn.className = s==='listening'?'on':s==='speaking'?'speaking':'';
  });
  document.getElementById('micIcon').textContent = s==='listening'?'🔴':s==='speaking'?'🔊':'🎙️';
  document.getElementById('mobileMicIcon').textContent = s==='listening'?'🔴':s==='speaking'?'🔊':'🎙️';

  const mlbl = document.getElementById('mlbl');
  const mbmlbl = document.getElementById('mbmlbl');
  const mlblTxt = s==='listening'? t('listeningStop') : s==='speaking'? t('buddyTalking') : t('tapSpeak');
  if(mlbl) { mlbl.textContent = mlblTxt; mlbl.className='mlbl'+(s==='listening'?' on':s==='speaking'?' sp':''); }
  if(mbmlbl) mbmlbl.textContent = s==='listening'? t('speak') : s==='speaking'? '🔊' : t('speak');
}

function setState(s){
  A.state=s; A.stT=0;
  updateStateLabels(s);
}

// VOICE ENGINE
// ═══════════════════════════════════════════════
function getFV(langCode){
  const vs = speechSynthesis.getVoices();
  if(langCode === 'zh-CN') {
    const zh = vs.find(v => /zh[-_]CN/i.test(v.lang)) || vs.find(v => /zh/i.test(v.lang));
    if(zh) return zh;
  }
  if(langCode === 'hi-IN') {
    const hi = vs.find(v => /hi[-_]IN/i.test(v.lang)) || vs.find(v => /hi/i.test(v.lang));
    if(hi) return hi;
  }
  for(const n of['Samantha','Karen','Moira','Victoria','Google US English','Microsoft Aria']){
    const v = vs.find(x => x.name.includes(n));
    if(v) return v;
  }
  return vs.find(v => /en/i.test(v.lang)) || vs[0] || null;
}

function speakText(text, onEnd){
  if(!('speechSynthesis' in window)){ setState('idle'); onEnd&&onEnd(); return; }
  speechSynthesis.cancel();
  const langCode = LANG[currentLang].voiceLang;
  // For Chinese/Hindi, don't strip non-ASCII chars
  let clean;
  if(currentLang === 'en') {
    clean = text.replace(/[\uD800-\uDFFF]|[\u2600-\u27FF]|[\u{1F000}-\u{1FFFF}]/gu,' ')
      .replace(/[^\w\s,.!?'"%-]/g,' ').replace(/\s+/g,' ').trim().slice(0,400);
  } else {
    clean = text.replace(/[\uD800-\uDFFF]/g,' ')
      .replace(/[\u2600-\u27FF]/g,' ')
      .replace(/[\u{1F000}-\u{1FFFF}]/gu,' ')
      .replace(/\s+/g,' ').trim().slice(0,400);
  }
  if(!clean){ setState('idle'); onEnd&&onEnd(); return; }
  const go = () => {
    const u = new SpeechSynthesisUtterance(clean);
    const v = getFV(langCode); if(v) u.voice=v;
    u.lang = langCode;
    u.rate = currentLang==='zh'?.9:currentLang==='hi'?.85:.82;
    u.pitch = 1.12; u.volume = 1;
    u.onstart = () => setState('speaking');
    u.onend = () => { setState('idle'); onEnd&&onEnd(); };
    u.onerror = () => { setState('idle'); onEnd&&onEnd(); };
    speechSynthesis.speak(u);
  };
  setTimeout(() => {
    speechSynthesis.getVoices().length===0
      ? (speechSynthesis.onvoiceschanged=()=>{ go(); speechSynthesis.onvoiceschanged=null; })
      : go();
  }, 80);
}

let micPermissionGranted = false;

async function initMicPermission(){
  if(navigator.permissions){
    try{
      const s = await navigator.permissions.query({name:'microphone'});
      if(s.state==='granted'){ micPermissionGranted=true; hideMicModal(); return; }
      if(s.state==='denied'){ showBlockedInstructions(); return; }
      showMicModal(); return;
    }catch(e){}
  }
  showMicModal();
}
function showMicModal(){ document.getElementById('micModal').style.display='flex'; }
function hideMicModal(){ document.getElementById('micModal').style.display='none'; }
function dismissMicModal(){ hideMicModal(); micToast('💬 No mic? Use the text box!','#6BCB77'); }
function showBlockedInstructions(){
  const modal = document.getElementById('micModal');
  modal.style.display='flex';
  modal.querySelector('.modal-box').innerHTML=`
    <div style="font-size:44px;margin-bottom:10px;">🔒</div>
    <div style="font-family:'Fredoka One',cursive;font-size:20px;color:#FF6B6B;margin-bottom:8px;">Microphone is blocked</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.65);line-height:1.7;margin-bottom:18px;text-align:left;">
      <strong style="color:#fff">1.</strong> Click the <strong style="color:#FFD93D">🔒 lock icon</strong> in your address bar<br>
      <strong style="color:#fff">2.</strong> Find <strong style="color:#FFD93D">Microphone</strong> → Allow<br>
      <strong style="color:#fff">3.</strong> <strong style="color:#FFD93D">Refresh this page</strong>
    </div>
    <button onclick="location.reload()" class="modal-allow" style="background:linear-gradient(135deg,#4ade80,#16a34a);">🔄 Refresh Page</button>
    <button onclick="dismissMicModal()" class="modal-skip">Skip — I'll type instead</button>`;
}
async function requestMicPermission(){
  const status = document.getElementById('micModalStatus');
  status.textContent = 'Asking for permission…'; status.style.color='#FFD93D';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    stream.getTracks().forEach(t2=>t2.stop());
    micPermissionGranted = true;
    status.textContent = '✅ Microphone allowed!'; status.style.color='#4ade80';
    setTimeout(hideMicModal, 700);
  }catch(err){
    if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError') showBlockedInstructions();
    else { status.textContent = 'Error: '+err.message; status.style.color='#FF6B6B'; }
  }
}
function micToast(msg, color='#FF6B6B'){
  let t2=document.getElementById('micToast');
  if(!t2){t2=document.createElement('div');t2.id='micToast';
    t2.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 20px;border-radius:12px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;color:#fff;max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(t2);}
  t2.style.background=color; t2.style.opacity='1'; t2.textContent=msg;
  clearTimeout(t2._timer); t2._timer=setTimeout(()=>t2.style.opacity='0',3500);
}

function toggleListen(){
  if(isListening){ stopListen(); return; }
  if(!micPermissionGranted){
    if(navigator.permissions){
      navigator.permissions.query({name:'microphone'}).then(s=>{
        if(s.state==='denied'){ showBlockedInstructions(); showMicModal(); }
        else if(s.state==='prompt') showMicModal();
        else { micPermissionGranted=true; startListen(); }
      }).catch(()=>startListen());
    }else startListen();
    return;
  }
  startListen();
}

function startListen(){
  speechSynthesis.cancel();
  if(recog){ try{recog.abort();}catch(e){} recog=null; }
  setState('listening'); isListening=true; let gotResult=false, retries=0;
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ micToast('🎙️ Speech recognition not supported in this browser.'); stopListen(); return; }
  function doStart(){
    recog=new SR(); recog.continuous=false; recog.interimResults=true;
    recog.lang = LANG[currentLang].voiceLang;
    recog.maxAlternatives=3;
    recog.onstart=()=>{ showLiveT(t('listening')+'…'); };
    recog.onresult=e=>{
      let interim='',final='';
      for(const r of e.results){ if(r.isFinal) final+=r[0].transcript; else interim+=r[0].transcript; }
      showLiveT(final||interim);
      if(final){ gotResult=true; stopListen(); handleVoiceInput(final.trim()); }
    };
    recog.onspeechend=()=>{ setTimeout(()=>{ if(!gotResult&&recog) recog.stop(); },300); };
    recog.onerror=e=>{
      if(e.error==='no-speech'){ if(retries<1){ retries++; setTimeout(doStart,400); return; } stopListen(); micToast('🎙️ I didn\'t hear you. Try again!','#6BCB77'); return; }
      stopListen();
      if(e.error==='not-allowed'||e.error==='service-not-allowed'){ micPermissionGranted=false; showBlockedInstructions(); showMicModal(); return; }
    };
    recog.onend=()=>{ if(!gotResult&&isListening){ if(retries<1){ retries++; setTimeout(doStart,300); }else stopListen(); } };
    try{ recog.start(); }catch(err){ stopListen(); }
  }
  doStart();
}

function stopListen(){
  isListening=false; if(recog){ try{recog.abort();}catch(e){} recog=null; }
  showLiveT(''); if(A.state==='listening') setState('idle');
}

  const el=document.getElementById('liveT'),tx=document.getElementById('ltText');

}

async function handleVoiceInput(text){
  const lower = text.trim().toLowerCase();
  if(mode==='quiz'&&!answered){
    const spokenLetter = extractLetter(text);
    if(spokenLetter){
      const L = LETTERS[curIdx];
      const btns = [...document.querySelectorAll('.choice')];
      const matchBtn = btns.find(b=>b.textContent.trim()===spokenLetter);
      if(matchBtn){ checkAnswer(spokenLetter, L.l, matchBtn); return; }
    }
  }
  if(mode==='learn'){
    const spokenLetter = extractLetter(text);
    if(spokenLetter){
      const idx = LETTERS.findIndex(x=>x.l===spokenLetter);
      if(idx>=0){ selectLetter(idx); const L=LETTERS[idx]; setTimeout(()=>speakText(`Yes! ${L.l}! ${L.l} is for ${L.w}!`,()=>{}),400); return; }
    }
    const wordMatch = LETTERS.find(x=>lower.includes(x.w.toLowerCase()));
    if(wordMatch){ const idx=LETTERS.indexOf(wordMatch); selectLetter(idx); setTimeout(()=>speakText(`${wordMatch.w}! That starts with ${wordMatch.l}!`,()=>{}),400); return; }
  }
  if(mode!=='chat') setMode('chat');
  addChatMsg(text,'u'); showLiveT(''); setState('thinking');
  const lid = addChatMsg('','b','<div class="dl-wrap"><div class="dl"></div><div class="dl"></div><div class="dl"></div></div>');
  const API_KEY = 'YOUR_API_KEY_HERE';
  if(!API_KEY||API_KEY==='YOUR_API_KEY_HERE'){
    removeMsg(lid);
    const fb = `${LETTERS[curIdx].l} is for ${LETTERS[curIdx].w}! Can you say ${LETTERS[curIdx].l}?`;
    addChatMsg(t('addAPIKey')+fb,'b');
    speakText(fb,()=>{}); return;
  }
  const sysPrompt = currentLang==='hi'
    ? `आप बडी हैं, 3-8 साल के बच्चों के लिए एक दोस्ताना टेडी बियर शिक्षक। A-Z अक्षर और ध्वनि सिखाएं। जवाब छोटा रखें (2-3 वाक्य)। सरल हिंदी में जवाब दें। हमेशा उत्साहजनक रहें।`
    : currentLang==='zh'
    ? `你是巴迪，一个为3-8岁儿童服务的友好泰迪熊老师。教授A-Z字母和自然拼读。回答要简短（2-3句话）。用简单的中文回答。永远保持鼓励的态度。`
    : `You are Buddy, a friendly teddy bear tutor for kids aged 3-8. Teach A-Z alphabets and phonics. Keep answers SHORT (2-3 sentences). Very simple words only. Always warm and encouraging!`;
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-iab':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:sysPrompt,messages:[{role:'user',content:text}]})
    });
    const d = await r.json(); removeMsg(lid);
    const reply = d.content?.[0]?.text || `${LETTERS[curIdx].l} is for ${LETTERS[curIdx].w}!`;
    addChatMsg(reply,'b'); speakText(reply,()=>{});
  }catch(e){
    removeMsg(lid);
    const fb = `${LETTERS[curIdx].l} is for ${LETTERS[curIdx].w}!`;
    addChatMsg(fb,'b'); speakText(fb,()=>{});
  }
}

function extractLetter(text){
  const upper = text.trim().toUpperCase();
  if(/^[A-Z]$/.test(upper)) return upper;
  const m1 = upper.match(/\bLETTER\s+([A-Z])\b/); if(m1) return m1[1];
  const m2 = upper.match(/\b(?:IS|IT'S|THINK|ANSWER|CHOOSE|PICK|SAY)\s+([A-Z])\b/); if(m2) return m2[1];
  const phonetic={'AY':'A','BEE':'B','CEE':'C','DEE':'D','EE':'E','EF':'F','GEE':'G','HI':'H','AITCH':'H','EYE':'I','JAY':'J','KAY':'K','EL':'L','EM':'M','EN':'N','OH':'O','PEE':'P','CUE':'Q','AR':'R','ESS':'S','TEE':'T','YOU':'U','VEE':'V','WE':'W','EX':'X','WHY':'Y','ZEE':'Z','ZED':'Z'};
  const words = upper.replace(/[^A-Z\s]/g,'').trim().split(/\s+/);
  if(words.length===1&&phonetic[words[0]]) return phonetic[words[0]];
  const last = words[words.length-1];
  if(/^[A-Z]$/.test(last)) return last;
  if(phonetic[last]) return phonetic[last];
  return null;
}

function sendText(){
  const inp=document.getElementById('ci'), t3=inp.value.trim();
  if(!t3) return;
  inp.value='';
  handleVoiceInput(t3);
}
document.getElementById('ci').addEventListener('keydown', e => { if(e.key==='Enter') sendText(); });
function prevLetter(){ selectLetter(Math.max(0,curIdx-1)); }
function nextLetter(){ selectLetter(Math.min(25,curIdx+1)); }
function clearPanel(){ if(mode==='learn') showLearnPanel(); else if(mode==='quiz') showQuizPanel(); else showChatPanel(); }

function confetti(){
  const colors=['#FFD93D','#FF6B6B','#6BCB77','#6EC6F5','#c77dff'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;left:${Math.random()*100}%;top:-10px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*5)]};border-radius:${Math.random()>.5?'50%':'2px'};animation:fall ${.8+Math.random()*1.2}s linear ${Math.random()*.4}s forwards;z-index:999;pointer-events:none;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}
if(!document.getElementById('fallStyle')){
  const s=document.createElement('style'); s.id='fallStyle';
  s.textContent='@keyframes fall{from{transform:translateY(0) rotate(0);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}';
  document.head.appendChild(s);
}

window.addEventListener('load',()=>{
  document.getElementById('modalAllowBtn')?.addEventListener('click', requestMicPermission);
  document.getElementById('modalSkipBtn')?.addEventListener('click', dismissMicModal);
  initMicPermission();
  setState('greeting');
  showLearnPanel();
  setTimeout(()=>{
    const L = LETTERS[0];
    speakText(t('speakGreet', L.l, L.w), ()=>{});
  }, 700);
});
</script>
